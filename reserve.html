<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IT-юрист для Insapp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body { margin:0; font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#f5f6fa; color:#2d3436; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
    .card { width:min(100%, 460px); background:#fff; border:1px solid #e0e0e0; border-radius:20px; padding:40px 32px; box-shadow:0 4px 24px rgba(0,0,0,.08); }
    h1 { margin:0 0 10px; font-size:28px; line-height:1.15; color:#2d3436; }
    p { margin:0 0 22px; color:#636e72; line-height:1.6; font-size:14px; }
    label { display:block; margin-bottom:8px; font-size:12px; font-weight:700; color:#636e72; text-transform:uppercase; letter-spacing:.08em; }
    input { width:100%; padding:14px 16px; border:2px solid #dfe6e9; background:#f8f9fa; color:#2d3436; border-radius:12px; font-size:18px; outline:none; margin-bottom:14px; transition:border-color .18s ease, box-shadow .18s ease; }
    input:focus { border-color:#0984e3; box-shadow:0 0 0 4px rgba(9,132,227,.12); }
    button { width:100%; padding:14px 18px; background:#0984e3; color:#fff; border:none; border-radius:12px; font-size:15px; font-weight:700; cursor:pointer; transition:background .18s ease, transform .12s ease, box-shadow .18s ease; box-shadow:0 10px 22px rgba(9,132,227,.18); }
    button:hover { background:#0770c2; transform:translateY(-1px); box-shadow:0 14px 28px rgba(7,112,194,.24); }
    button:active { background:#055a9c; transform:translateY(0); box-shadow:inset 0 2px 6px rgba(255,255,255,.12); }
    .error { display:none; margin-top:14px; color:#d63031; font-size:14px; }
    .hint { margin-top:16px; font-size:12px; color:#95a5a6; text-align:center; }
  </style>
</head>

        const parser = new DOMParser();
        const doc = parser.parseFromString(plainHtml, 'text/html');
        const head = doc.head || doc.getElementsByTagName('head')[0] || doc.documentElement.insertBefore(doc.createElement('head'), doc.body);
        const addLink = (href, rel='stylesheet', extra={}) => {
          const link = doc.createElement('link');
          link.rel = rel;
          link.href = href;
          Object.entries(extra).forEach(([k,v]) => link.setAttribute(k, v));
          head.prepend(link);
        };
        addLink('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        addLink('https://fonts.gstatic.com', 'preconnect', { crossorigin: '' });
        addLink('https://fonts.googleapis.com', 'preconnect');
        document.open();
        document.write('<!DOCTYPE html>', doc.documentElement.outerHTML);
        document.close();
      } catch (e) {
        err.style.display = 'block';
        console.error(e && e.message ? e.message : e);
      }
    }
    document.getElementById('unlock').addEventListener('click', decryptAndOpen);
    document.getElementById('password').addEventListener('keydown', (e) => { if (e.key === 'Enter') decryptAndOpen(); });
  </script>
</body>
</html>
